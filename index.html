<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Bubur</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 p-4">
<div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">

<h1 class="text-xl font-bold mb-4">Laporan Bubur Ayam</h1>

<input id="tanggal" placeholder="Tanggal" class="input">

<h2>SHIFT 1</h2>
<input id="s1_offline" placeholder="Offline" class="input">
<input id="s1_gojek" placeholder="Gojek" class="input">
<input id="s1_grab" placeholder="Grab" class="input">
<input id="s1_shopee" placeholder="Shopee" class="input">

<h2 class="mt-4">SHIFT 2</h2>
<input id="s2_offline" placeholder="Offline" class="input">
<input id="s2_gojek" placeholder="Gojek" class="input">
<input id="s2_grab" placeholder="Grab" class="input">
<input id="s2_shopee" placeholder="Shopee" class="input">

<h2 class="mt-4">Penjualan Offline</h2>
<input id="jual1" placeholder="Shift 1" class="input">
<input id="jual2" placeholder="Shift 2" class="input">

<h2 class="mt-4">QRIS</h2>
<input id="qris1" placeholder="Shift 1" class="input">
<input id="qris2" placeholder="Shift 2" class="input">

<h2 class="mt-4">Pengeluaran Shift 1</h2>
<div id="pengeluaran1"></div>
<button type="button" id="btnTambah1" class="btn">+ Tambah</button>

<h2 class="mt-4">Pengeluaran Shift 2</h2>
<div id="pengeluaran2"></div>
<button type="button" id="btnTambah2" class="btn">+ Tambah</button>

<h2 class="mt-4">Stok</h2>
<input id="ayam" placeholder="Ayam (kg)" class="input">
<input id="beras" placeholder="Beras (kg)" class="input">

<h2 class="mt-4">Sisa Bubur</h2>
<input id="sisa1" placeholder="Shift 1" class="input">
<input id="sisa2" placeholder="Shift 2" class="input">

<div class="grid grid-cols-2 gap-2 mt-4">
<button onclick="generate('s1')" class="bg-yellow-500 text-white p-2 rounded">Shift 1</button>
<button onclick="generate('full')" class="bg-green-600 text-white p-2 rounded">Full</button>
</div>

<button onclick="saveOnline()" class="bg-green-700 text-white p-2 rounded mt-2 w-full">Save Online</button>
<button onclick="loadOnline()" class="bg-blue-700 text-white p-2 rounded mt-2 w-full">Load Online</button>

<textarea id="output" class="w-full border mt-4 p-2 h-72"></textarea>

</div>

<style>
.input{width:100%;border:1px solid #ccc;padding:8px;margin-top:5px;border-radius:8px}
.btn{background:#3b82f6;color:white;padding:6px;border-radius:6px;margin-top:6px}
</style>

<script>
// ===== SUPABASE =====
const supabaseClient = window.supabase.createClient(
"https://ngrdwetkqwbsxgqmvyoy.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ncmR3ZXRrcXdic3hncW12eW95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTU2NzIsImV4cCI6MjA5MTgzMTY3Mn0.mCtXaje5VTIdjJ_PG0gwOoKs2PsVxUGYjH5uKFOXouU"
);

// ===== TAMBAH INPUT =====
document.addEventListener("DOMContentLoaded", () => {
  btnTambah1.onclick=()=>tambah('pengeluaran1');
  btnTambah2.onclick=()=>tambah('pengeluaran2');
});

function tambah(id){
  let div=document.createElement('div');
  div.className='flex gap-2 mt-2';
  div.innerHTML=`
    <input placeholder="Nama" class="w-1/2 border p-2 rounded">
    <input type="number" placeholder="Harga" class="w-1/2 border p-2 rounded">
  `;
  document.getElementById(id).appendChild(div);
}

// ===== HELPER =====
function sum(id){return parseInt(document.getElementById(id).value)||0}
function rp(n){return n.toLocaleString('id-ID')}

// ===== AMBIL PENGELUARAN =====
function getPengeluaran(id){
  let total=0,text="";
  document.querySelectorAll("#"+id+" div").forEach(el=>{
    let n=el.children[0].value;
    let h=parseInt(el.children[1].value)||0;
    if(n){
      text+=`- ${n} = ${rp(h)}\n`;
      total+=h;
    }
  });
  return {total,text};
}
// GENERATE  
function generate(mode){

let tanggal = document.getElementById("tanggal").value;

// SHIFT 1
let s1_off = sum("s1_offline");
let s1_go = sum("s1_gojek");
let s1_gr = sum("s1_grab");
let s1_sh = sum("s1_shopee");
let total1 = s1_off + s1_go + s1_gr + s1_sh;

// SHIFT 2
let s2_off = sum("s2_offline");
let s2_go = sum("s2_gojek");
let s2_gr = sum("s2_grab");
let s2_sh = sum("s2_shopee");
let total2 = s2_off + s2_go + s2_gr + s2_sh;

// PENJUALAN
let jual1 = sum("jual1");
let jual2 = sum("jual2");

// QRIS
let q1 = sum("qris1");
let q2 = sum("qris2");

// STOK
let ayam = document.getElementById("ayam").value || "";
let beras = document.getElementById("beras").value || "";

// SISA
let sisa1 = sum("sisa1");
let sisa2 = sum("sisa2");

// PENGELUARAN
function ambil(id){
  let total = 0;
  let text = "";

  document.querySelectorAll("#"+id+" div").forEach(el=>{
    let nama = el.children[0].value;
    let harga = parseInt(el.children[1].value)||0;

    if(nama){
      text += `- ${nama} = ${rp(harga)}\n`;
      total += harga;
    }
  });

  return {text,total};
}

let p1 = ambil("pengeluaran1");
let p2 = ambil("pengeluaran2");

// HITUNGAN
let totalOffline = jual1 + (mode==='full'?jual2:0);
let totalPengeluaran = p1.total + (mode==='full'?p2.total:0);
let totalQris = q1 + (mode==='full'?q2:0);

let totalTransfer = totalOffline - totalPengeluaran;
let sisaUang = totalTransfer - totalQris;

// OUTPUT
let text =
`*SHIFT 1*
*LAPORAN HARIAN*
*BUBUR AYAM KOBE*
*${tanggal}*

*SHIFT 1*
Offline = ${s1_off} Porsi
Gojeg = ${s1_go} Porsi
Grab = ${s1_gr} Porsi
Shopee = ${s1_sh} Porsi
*Total Porsi Terjual = ${total1} Porsi*
-----------------------------------------------------------------
*SHIFT 2*
Offline = ${mode==='full'?s2_off:''} Porsi
Gojeg = ${mode==='full'?s2_go:''} Porsi
Grab = ${mode==='full'?s2_gr:''} Porsi
Shopee = ${mode==='full'?s2_sh:''} Porsi
*Total Porsi Terjual = ${mode==='full'?total2:''} Porsi*

*Total Porsi Terjual  Shift 1 & 2 = ${mode==='full'?total1+total2:total1} Porsi*
-----------------------------------------------------------------

*(+) Penjualan Offline = ${rp(totalOffline)}*
Shift 1 = ${rp(jual1)}
Shift 2 = ${mode==='full'?rp(jual2):''}
 
*TRANSAKSI QRIS*
Shift 1 = ${rp(q1)}
Shift 2 = ${mode==='full'?rp(q2):''}
*Total Transaksi Qris = ${rp(totalQris)}*

*(+) Pengeluaran Lainnya Lainnya*
*PENGELUARAN AYAM : ${ayam} KG*
Shift 1 = ${ayam} Kg
Shift 2 = ${mode==='full'?ayam:''}

*PENGELUARAN BERAS = ${beras} KG*
Shift 1 = ${beras} Kg
Shift 2 = ${mode==='full'?beras:''}

*(-) Pengeluaran Toko Shift 1*
${p1.text}


*(=) Total Pengeluaran Toko Shift 1 = ${rp(p1.total)}*

*(-) Pengeluaran Toko Shift 2*
${mode==='full'?p2.text:''}
*(=) Total Pengeluaran Toko Shift 2 =${mode==='full'?rp(p2.total):''}*

*Total Pengeluaran Toko Shift 1 & 2 = ${rp(totalPengeluaran)}*
_______________________________________________
 
 *(-) Uang Belanja*
  
*Total Transfer = ${rp(totalTransfer)}*
*Total Qris = ${rp(totalQris)}*
*Total Transfer - Qris =${rp(sisaUang)}*
  (Penjualan Offline - Belanja Shift 1 & 2)

*SISA BUBUR*
Shift 1 = ${sisa1} Porsi
Shift 2 = ${mode==='full'?sisa2:''} Porsi
*Total Sisa = ${mode==='full'?sisa1+sisa2:sisa1} Porsi*
`;

document.getElementById("output").value = text;
}
// ===== SAVE =====
async function saveOnline(){

  const data = {
    inputs: {},
    pengeluaran1: [],
    pengeluaran2: []
  };

  // input biasa
  document.querySelectorAll("input").forEach(i=>{
    data.inputs[i.id] = i.value;
  });

  // pengeluaran shift 1
  document.querySelectorAll("#pengeluaran1 div").forEach(el=>{
    data.pengeluaran1.push({
      nama: el.children[0].value,
      harga: el.children[1].value
    });
  });

  // pengeluaran shift 2
  document.querySelectorAll("#pengeluaran2 div").forEach(el=>{
    data.pengeluaran2.push({
      nama: el.children[0].value,
      harga: el.children[1].value
    });
  });

  const { error } = await supabaseClient
    .from("laporan")
    .upsert([{ id: 1, data }]);

  if(error){
    alert("ERROR: "+error.message);
  }else{
    alert("Tersimpan!");
  }
}

// ===== LOAD =====
async function loadOnline(){

  const { data, error } = await supabaseClient
    .from("laporan")
    .select("*")
    .eq("id",1)
    .single();

  if(error || !data){
    alert("Belum ada data");
    return;
  }

  let d = data.data;

  // input biasa
  Object.keys(d.inputs).forEach(id=>{
    if(document.getElementById(id)){
      document.getElementById(id).value = d.inputs[id];
    }
  });

  // reset dulu
  document.getElementById("pengeluaran1").innerHTML = "";
  document.getElementById("pengeluaran2").innerHTML = "";

  // isi ulang shift 1
  d.pengeluaran1.forEach(item=>{
    tambah("pengeluaran1");
    let el = document.querySelectorAll("#pengeluaran1 div");
    el = el[el.length-1];
    el.children[0].value = item.nama;
    el.children[1].value = item.harga;
  });

  // isi ulang shift 2
  d.pengeluaran2.forEach(item=>{
    tambah("pengeluaran2");
    let el = document.querySelectorAll("#pengeluaran2 div");
    el = el[el.length-1];
    el.children[0].value = item.nama;
    el.children[1].value = item.harga;
  });

  alert("Loaded!");
}

</script>
</body>
</html>
